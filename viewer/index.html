<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Split-flap viewer (GLB test harness)</title>
<style>
  html, body { margin: 0; height: 100%; background: #17181a; overflow: hidden;
               font-family: system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
  #panel {
    position: fixed; left: 14px; top: 14px; z-index: 10; width: 300px;
    background: rgba(24,25,28,.92); border: 1px solid #333; border-radius: 10px;
    padding: 12px; color: #ddd; backdrop-filter: blur(6px);
  }
  #panel h1 { font-size: 13px; margin: 0 0 8px; letter-spacing: .12em;
              color: #aaa; font-weight: 600; }
  textarea {
    width: 100%; box-sizing: border-box; background: #101113; color: #eee;
    border: 1px solid #3a3a3a; border-radius: 6px; padding: 8px;
    font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.5;
    resize: none; text-transform: uppercase;
  }
  button {
    background: #2b6cb0; color: #fff; border: 0; border-radius: 6px;
    padding: 7px 12px; margin: 8px 6px 0 0; cursor: pointer; font-size: 13px;
  }
  button.sec { background: #3a3f45; }
  button:hover { filter: brightness(1.15); }
  label { font-size: 12px; color: #999; display: block; margin-top: 10px; }
  input[type=range] { width: 100%; }
  #stats { margin-top: 8px; font-size: 11px; color: #777; }
</style>
</head>
<body>
<div id="app"></div>
<div id="panel">
  <h1>SPLIT-FLAP TEST HARNESS</h1>
  <textarea id="text" rows="6" maxlength="200" spellcheck="false"
            placeholder="6 lines of 22 characters …"></textarea>
  <button id="go">Display ⏎</button>
  <button id="quote" class="sec">Quote</button>
  <button id="chips" class="sec">Chips</button>
  <button id="clear" class="sec">Clear</button>
  <label>Flip speed: <span id="msLabel">67</span> ms/flap
    <input id="ms" type="range" min="35" max="150" value="67">
  </label>
  <label style="display:flex;align-items:center;gap:8px;margin-top:8px">
    <input id="snd" type="checkbox" checked style="width:auto"> 🔊 Sound
    <input id="vol" type="range" min="0" max="100" value="60" style="flex:1">
  </label>
  <div id="stats">loading GLB …</div>
</div>
<script type="importmap">
{ "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/addons/"
} }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
